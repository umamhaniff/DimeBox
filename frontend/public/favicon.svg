<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <!-- Neon cyan outer brackets -->
  <path d="M 20 10 L 10 10 L 10 20" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 80 10 L 90 10 L 90 20" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 20 90 L 10 90 L 10 80" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 80 90 L 90 90 L 90 80" stroke="#00f0ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Holographic Box Isometric representation in Neon Purple/Cyan -->
  <!-- Top Face -->
  <polygon points="50,25 75,37.5 50,50 25,37.5" fill="rgba(0, 240, 255, 0.1)" stroke="#00f0ff" stroke-width="4" stroke-linejoin="round" />
  <!-- Left Face -->
  <polygon points="25,37.5 50,50 50,75 25,62.5" fill="rgba(134, 59, 255, 0.15)" stroke="#863bff" stroke-width="4" stroke-linejoin="round" />
  <!-- Right Face -->
  <polygon points="50,50 75,37.5 75,62.5 50,75" fill="rgba(134, 59, 255, 0.1)" stroke="#863bff" stroke-width="4" stroke-linejoin="round" />

  <!-- Core dimension glowing point -->
  <circle cx="50" cy="50" r="5" fill="#00f0ff" />
  <circle cx="50" cy="50" r="10" fill="rgba(0, 240, 255, 0.3)" />
</svg>